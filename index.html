<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecompTrack - Fixed Import</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-dumbbell text-white text-3xl"></i>
                </div>
                <div>
                    <span class="font-display text-3xl font-semibold tracking-tighter">RecompTrack</span>
                    <span class="text-emerald-400 text-xs block -mt-1">FFMI + BODY RECOMP (Fixed Import)</span>
                </div>
            </div>
            <div class="flex gap-x-2">
                <button onclick="importWithingsCSV()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-upload"></i>
                    <span>Import Withings CSV</span>
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 text-center">
            <h1 class="text-2xl font-semibold mb-4">CSV Import Test Page</h1>
            <p class="text-zinc-400 mb-6">This version has improved Withings CSV parsing.</p>
            
            <button onclick="importWithingsCSV()" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">
                Upload Withings CSV
            </button>
            
            <div class="mt-8 text-left max-w-md mx-auto">
                <div class="text-sm text-zinc-400 mb-2">Debug Info:</div>
                <div id="debug-info" class="bg-zinc-800 p-3 rounded-xl text-xs font-mono"></div>
            </div>
        </div>
    </div>

    <script>
        function showDebug(msg) {
            const el = document.getElementById('debug-info');
            el.innerHTML = msg;
        }

        function importWithingsCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(ev) {
                    const text = ev.target.result;
                    parseWithingsCSV(text);
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function parseWithingsCSV(csvText) {
            const lines = csvText.trim().split(/\r?\n/);
            if (lines.length < 2) {
                alert('CSV appears empty or has no data rows.');
                return;
            }

            const headerLine = lines[0].toLowerCase();
            const headers = headerLine.split(',').map(h => h.trim().replace(/"/g, ''));

            showDebug(`Headers found: ${headers.join(' | ')}`);

            let dateIndex = -1;
            let weightIndex = -1;
            let fatIndex = -1;

            headers.forEach((h, i) => {
                if (h.includes('date')) dateIndex = i;
                if (h.includes('weight')) weightIndex = i;
                if ((h.includes('fat') && h.includes('%')) || h.includes('body fat') || h.includes('fat mass')) {
                    fatIndex = i;
                }
            });

            if (dateIndex === -1 || weightIndex === -1 || fatIndex === -1) {
                alert(`Could not find required columns.\n\nFound headers: ${headers.join(', ')}\n\nPlease make sure your CSV has columns for Date, Weight, and Body Fat %.`);
                return;
            }

            let added = 0;
            const existingLogs = JSON.parse(localStorage.getItem('recomptrack_logs') || '[]');

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                
                const dateVal = values[dateIndex];
                const weightVal = parseFloat(values[weightIndex]);
                let fatVal = parseFloat(values[fatIndex]);

                // Try to handle fat mass in kg/lbs if percentage not found
                if (isNaN(fatVal) && fatIndex !== -1) {
                    const rawFat = parseFloat(values[fatIndex]);
                    if (!isNaN(rawFat) && weightVal) {
                        fatVal = (rawFat / weightVal) * 100;
                    }
                }

                if (!dateVal || isNaN(weightVal) || isNaN(fatVal)) continue;

                // Normalize date
                let date;
                try {
                    date = new Date(dateVal).toISOString().split('T')[0];
                } catch {
                    continue;
                }

                // Avoid duplicates
                if (!existingLogs.find(l => l.date === date)) {
                    existingLogs.push({
                        date: date,
                        weight: weightVal,
                        bf: parseFloat(fatVal.toFixed(2))
                    });
                    added++;
                }
            }

            if (added > 0) {
                localStorage.setItem('recomptrack_logs', JSON.stringify(existingLogs));
                alert(`Successfully imported ${added} new measurements!`);
            } else {
                alert('No new valid measurements were found in the CSV.\n\nThis can happen if:\n- The data already exists\n- Column names are very different from expected\n- Dates or numbers are in an unexpected format');
            }
        }
    </script>
</body>
</html>
