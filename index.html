<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecompTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .metric-card { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .metric-card:hover { transform: translateY(-2px); }
        .progress-bar { transition: width 0.4s ease; }
        .time-btn { padding: 4px 12px; font-size: 12px; border-radius: 9999px; transition: all 0.2s; }
        .time-btn.active { background-color: #10b981; color: white; font-weight: 600; }
        
        .tooltip {
            position: relative;
            display: inline-block;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 340px;
            background-color: #18181b;
            color: #e4e4e7;
            text-align: left;
            border-radius: 8px;
            padding: 14px;
            position: absolute;
            z-index: 10;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid #3f3f46;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-dumbbell text-white text-3xl"></i>
                </div>
                <div>
                    <span class="font-display text-3xl font-semibold tracking-tighter">RecompTrack</span>
                    <span class="text-emerald-400 text-xs block -mt-1">FFMI + BODY RECOMP</span>
                </div>
            </div>
            <div class="flex gap-x-2">
                <button onclick="importWithingsCSV()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-upload"></i>
                    <span>Import Withings</span>
                </button>
                <button onclick="showProfileModal()" class="px-4 py-2 bg-zinc-900 border border-zinc-700 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile & Goals</span>
                </button>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="mb-8">
            <h1 class="font-display text-4xl font-semibold tracking-tighter mb-6">Dashboard</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">
                <!-- Weight -->
                <div class="metric-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="text-emerald-400 text-xs font-semibold mb-1">WEIGHT</div>
                    <div id="dash-weight" class="text-5xl font-semibold tabular-nums">—</div>
                    <div class="text-xs text-zinc-500">lbs</div>
                    <div class="mt-3">
                        <div class="flex justify-between text-[10px] text-zinc-400 mb-1">
                            <span>Goal Progress</span>
                            <span id="weight-progress-text">—</span>
                        </div>
                        <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                            <div id="weight-progress-bar" class="h-2 bg-emerald-500 progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Body Fat -->
                <div class="metric-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="text-orange-400 text-xs font-semibold mb-1">BODY FAT</div>
                    <div id="dash-bf" class="text-5xl font-semibold tabular-nums">—</div>
                    <div class="text-xs text-zinc-500">%</div>
                    <div class="mt-3">
                        <div class="flex justify-between text-[10px] text-zinc-400 mb-1">
                            <span>Goal Progress</span>
                            <span id="bf-progress-text">—</span>
                        </div>
                        <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                            <div id="bf-progress-bar" class="h-2 bg-orange-500 progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- FFMI -->
                <div class="metric-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="flex items-center gap-x-2 mb-1">
                        <div class="text-sky-400 text-xs font-semibold">FFMI</div>
                        <div class="tooltip">
                            <i class="fa-solid fa-info-circle text-sky-400 text-xs cursor-help"></i>
                            <span class="tooltiptext" id="ffmi-tooltip"></span>
                        </div>
                    </div>
                    <div id="dash-ffmi" class="text-5xl font-semibold tabular-nums">—</div>
                    <div class="mt-3">
                        <div class="flex justify-between text-[10px] text-zinc-400 mb-1">
                            <span>Goal Progress</span>
                            <span id="ffmi-progress-text">—</span>
                        </div>
                        <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                            <div id="ffmi-progress-bar" class="h-2 bg-sky-500 progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Lean Mass -->
                <div class="metric-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="text-teal-400 text-xs font-semibold mb-1">LEAN MASS</div>
                    <div id="dash-lean" class="text-5xl font-semibold tabular-nums">—</div>
                    <div class="text-xs text-zinc-500">lbs</div>
                </div>
            </div>
        </div>

        <!-- Quick Log + Chart -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-8">
            <div class="lg:col-span-2 bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                <div class="font-semibold mb-4">Quick Log</div>
                <div class="space-y-4">
                    <input type="date" id="quick-date" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 text-sm">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="quick-weight" placeholder="Weight (lbs)" step="0.01" class="bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 text-sm">
                        <input type="number" id="quick-bf" placeholder="Body Fat %" step="0.01" class="bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 text-sm">
                    </div>
                    <button onclick="quickLog()" class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-medium text-sm">Log Measurement</button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="font-semibold">Trends</div>
                    
                    <!-- Time Navigation -->
                    <div class="flex items-center gap-x-2">
                        <button onclick="shiftPeriod(-1)" class="px-3 py-1 text-xs border border-zinc-600 hover:bg-zinc-800 rounded-full">← Prev</button>
                        <div class="flex flex-wrap gap-1 text-xs">
                            <button onclick="filterChart('week')" id="btn-week" class="time-btn px-3 py-1 border border-zinc-600 hover:bg-zinc-800 rounded-full">Week</button>
                            <button onclick="filterChart('month')" id="btn-month" class="time-btn px-3 py-1 border border-zinc-600 hover:bg-zinc-800 rounded-full active">Month</button>
                            <button onclick="filterChart('quarter')" id="btn-quarter" class="time-btn px-3 py-1 border border-zinc-600 hover:bg-zinc-800 rounded-full">Quarter</button>
                            <button onclick="filterChart('year')" id="btn-year" class="time-btn px-3 py-1 border border-zinc-600 hover:bg-zinc-800 rounded-full">Year</button>
                            <button onclick="filterChart('all')" id="btn-all" class="time-btn px-3 py-1 border border-zinc-600 hover:bg-zinc-800 rounded-full">All</button>
                        </div>
                        <button onclick="shiftPeriod(1)" class="px-3 py-1 text-xs border border-zinc-600 hover:bg-zinc-800 rounded-full">Next →</button>
                    </div>
                </div>
                <div class="h-72"><canvas id="trend-chart"></canvas></div>
            </div>
        </div>

        <!-- History -->
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
            <div class="flex justify-between items-center mb-4">
                <div class="font-semibold">History</div>
                <button onclick="clearData()" class="text-xs text-red-400 hover:text-red-300">Clear All</button>
            </div>
            <div id="history-list" class="text-sm max-h-80 overflow-auto"></div>
        </div>
    </div>

    <!-- Profile & Goals Modal -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md mx-4 p-7">
            <div class="flex justify-between items-center mb-6">
                <div class="font-semibold text-xl">Profile & Goals</div>
                <button onclick="hideProfileModal()" class="text-xl">×</button>
            </div>

            <div class="mb-6">
                <div class="text-sm font-semibold text-zinc-400 mb-3">PROFILE</div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-zinc-400">Height (inches)</label>
                        <input type="number" id="profile-height" step="0.1" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400">Gender</label>
                        <select id="profile-gender" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="text-xs text-zinc-400">Name (optional)</label>
                        <input type="text" id="profile-name" placeholder="Your name" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                    </div>
                </div>
            </div>

            <div>
                <div class="text-sm font-semibold text-zinc-400 mb-3">GOALS</div>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-zinc-400">Target Weight (lbs)</label>
                        <input type="number" id="goal-weight" step="0.1" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400">Target Body Fat %</label>
                        <input type="number" id="goal-bf" step="0.1" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400">Target FFMI</label>
                        <input type="number" id="goal-ffmi" step="0.1" class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-4 py-2 mt-1">
                    </div>
                </div>
            </div>

            <button onclick="saveProfileAndGoals()" class="mt-6 w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-2xl font-semibold">
                Save Profile & Goals
            </button>
        </div>
    </div>

    <script>
        let logs = [];
        let profile = { heightInches: 63.5, name: '', gender: 'female' };
        let goals = { targetWeight: 130, targetBF: 22, targetFFMI: 17.5 };
        let chartInstance = null;
        let currentFilter = 'month';
        let currentOffset = 0; // For shifting time periods

        function loadData() {
            logs = JSON.parse(localStorage.getItem('recomptrack_logs') || '[]');
            const p = localStorage.getItem('recomptrack_profile');
            if (p) profile = JSON.parse(p);
            const g = localStorage.getItem('recomptrack_goals');
            if (g) goals = JSON.parse(g);
        }

        function saveData() {
            localStorage.setItem('recomptrack_logs', JSON.stringify(logs));
            localStorage.setItem('recomptrack_profile', JSON.stringify(profile));
            localStorage.setItem('recomptrack_goals', JSON.stringify(goals));
        }

        function inchesToCm(inches) { return inches * 2.54; }

        function calculateFFMI(weightLbs, bf) {
            if (!weightLbs || !bf || !profile.heightInches) return null;
            const kg = weightLbs / 2.20462;
            const m = inchesToCm(profile.heightInches) / 100;
            const lean = kg * (1 - bf / 100);
            return lean / (m * m);
        }

        function getFFMICategories(gender) {
            if (gender === 'male') {
                return [
                    { range: "< 17", label: "Poor / Below Average" },
                    { range: "17 – 19", label: "Average" },
                    { range: "19 – 21", label: "Good / Athletic" },
                    { range: "21 – 23", label: "Advanced" },
                    { range: "23+", label: "Elite (Natural)" }
                ];
            } else {
                return [
                    { range: "13 – 14.5", label: "Developing" },
                    { range: "15 – 16.5", label: "Average" },
                    { range: "17 – 18", label: "Athletic / Good" },
                    { range: "18.5 – 20", label: "Advanced" },
                    { range: "20+", label: "Elite (rare naturally)" }
                ];
            }
        }

        function updateFFMITooltip() {
            const tooltip = document.getElementById('ffmi-tooltip');
            if (!tooltip) return;

            const categories = getFFMICategories(profile.gender || 'female');
            let html = `
                <strong>FFMI Formula</strong><br>
                FFMI = Lean Mass (kg) ÷ Height² (m)<br><br>
                <strong>Lean Mass</strong> = Weight × (1 − Body Fat %)<br><br>
                <strong>FFMI Categories (${profile.gender === 'male' ? 'Men' : 'Women'})</strong><br>
            `;

            categories.forEach(cat => {
                html += `• <strong>${cat.range}</strong> → ${cat.label}<br>`;
            });

            tooltip.innerHTML = html;
        }

        function updateDashboard() {
            if (logs.length === 0) {
                document.getElementById('dash-weight').textContent = '—';
                document.getElementById('dash-bf').textContent = '—';
                document.getElementById('dash-ffmi').textContent = '—';
                document.getElementById('dash-lean').textContent = '—';
                return;
            }

            const latest = [...logs].sort((a, b) => b.date.localeCompare(a.date))[0];

            document.getElementById('dash-weight').textContent = latest.weight;
            document.getElementById('dash-bf').textContent = parseFloat(latest.bf).toFixed(2);

            const ffmi = calculateFFMI(latest.weight, latest.bf);
            document.getElementById('dash-ffmi').textContent = ffmi ? ffmi.toFixed(2) : '—';

            const lean = latest.weight * (1 - latest.bf / 100);
            document.getElementById('dash-lean').textContent = lean.toFixed(1);

            updateProgressBars(latest);
        }

        function updateProgressBars(latest) {
            const weightProgress = goals.targetWeight 
                ? Math.min(100, Math.max(0, ((latest.weight - (goals.targetWeight - 20)) / 20) * 100))
                : 50;
            document.getElementById('weight-progress-bar').style.width = weightProgress + '%';
            document.getElementById('weight-progress-text').textContent = weightProgress.toFixed(0) + '%';

            const bfProgress = goals.targetBF 
                ? Math.min(100, Math.max(0, ((30 - latest.bf) / (30 - goals.targetBF)) * 100))
                : 50;
            document.getElementById('bf-progress-bar').style.width = bfProgress + '%';
            document.getElementById('bf-progress-text').textContent = bfProgress.toFixed(0) + '%';

            const ffmi = calculateFFMI(latest.weight, latest.bf) || 0;
            const ffmiProgress = goals.targetFFMI 
                ? Math.min(100, Math.max(0, ((ffmi - 14) / (goals.targetFFMI - 14)) * 100))
                : 50;
            document.getElementById('ffmi-progress-bar').style.width = ffmiProgress + '%';
            document.getElementById('ffmi-progress-text').textContent = ffmiProgress.toFixed(0) + '%';
        }

        function getFilteredLogs(period, offset = 0) {
            if (!logs.length) return [];
            const sorted = [...logs].sort((a, b) => a.date.localeCompare(b.date));
            const today = new Date();
            let start = new Date(today);
            let end = new Date(today);

            switch(period) {
                case 'week':
                    start.setDate(today.getDate() - 7 - (offset * 7));
                    end.setDate(today.getDate() - (offset * 7));
                    break;
                case 'month':
                    start.setMonth(today.getMonth() - 1 - offset);
                    end.setMonth(today.getMonth() - offset);
                    break;
                case 'quarter':
                    start.setMonth(today.getMonth() - 3 - (offset * 3));
                    end.setMonth(today.getMonth() - (offset * 3));
                    break;
                case 'year':
                    start.setFullYear(today.getFullYear() - 1 - offset);
                    end.setFullYear(today.getFullYear() - offset);
                    break;
                case 'all':
                default:
                    return sorted;
            }

            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            return sorted.filter(log => log.date >= startStr && log.date <= endStr);
        }

        function updateChart(period = currentFilter) {
            currentFilter = period;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active', 'bg-emerald-500', 'text-white'));
            const activeBtn = document.getElementById('btn-' + period);
            if (activeBtn) activeBtn.classList.add('active', 'bg-emerald-500', 'text-white');

            const ctx = document.getElementById('trend-chart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();

            let filteredLogs = getFilteredLogs(period, currentOffset);
            if (filteredLogs.length === 0) {
                ctx.style.display = 'none';
                return;
            } else {
                ctx.style.display = 'block';
            }

            const labels = filteredLogs.map(l => l.date);
            const weights = filteredLogs.map(l => l.weight);
            const bfs = filteredLogs.map(l => parseFloat(l.bf));
            const ffmis = filteredLogs.map(l => calculateFFMI(l.weight, l.bf) || null);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Weight (lbs)', data: weights, borderColor: '#10b981', borderWidth: 2.5, tension: 0.3, yAxisID: 'y' },
                        { label: 'Body Fat %', data: bfs, borderColor: '#f59e0b', borderWidth: 2.5, tension: 0.3, yAxisID: 'y1' },
                        { label: 'FFMI', data: ffmis, borderColor: '#38bdf8', borderWidth: 2.5, tension: 0.3, yAxisID: 'y2' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { position: 'left', grid: { color: '#27272a' }, ticks: { color: '#71717a', font: { size: 10 } } },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#71717a', font: { size: 10 } } },
                        y2: { display: false }
                    },
                    plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } }
                }
            });
        }

        function shiftPeriod(direction) {
            currentOffset += direction;
            if (currentOffset < 0) currentOffset = 0;
            updateChart(currentFilter);
        }

        function filterChart(period) {
            currentOffset = 0;
            updateChart(period);
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';

            if (logs.length === 0) {
                container.innerHTML = '<p class="text-zinc-400 py-4">No measurements logged yet.</p>';
                return;
            }

            const sorted = [...logs].sort((a, b) => b.date.localeCompare(a.date));

            sorted.forEach(log => {
                const ffmi = calculateFFMI(log.weight, log.bf);
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center py-3 border-b border-zinc-800 text-sm';
                div.innerHTML = `
                    <div class="font-medium">${log.date}</div>
                    <div class="font-mono text-right">
                        ${log.weight} lbs &nbsp;•&nbsp; ${parseFloat(log.bf).toFixed(2)}% &nbsp;•&nbsp; 
                        <span class="text-sky-400">FFMI ${ffmi ? ffmi.toFixed(2) : '—'}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function quickLog() {
            const date = document.getElementById('quick-date').value || new Date().toISOString().split('T')[0];
            const weight = parseFloat(document.getElementById('quick-weight').value);
            const bf = parseFloat(document.getElementById('quick-bf').value);

            if (!weight || !bf) return alert('Enter weight and body fat %');

            logs.push({ date, weight, bf: parseFloat(bf.toFixed(2)) });
            saveData();
            updateDashboard();
            updateChart(currentFilter);
            renderHistory();
        }

        function importWithingsCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    parseWithingsCSV(ev.target.result);
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function parseWithingsCSV(csvText) {
            const lines = csvText.trim().split(/\r?\n/);
            if (lines.length < 2) return alert('CSV appears empty');
            const header = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/"/g, ''));
            let added = 0;

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                let date = null, weight = null, fat = null;
                header.forEach((h, idx) => {
                    const val = values[idx];
                    if (!val) return;
                    if (h.includes('date')) {
                        const d = new Date(val);
                        if (!isNaN(d)) date = d.toISOString().split('T')[0];
                    }
                    if (h.includes('weight')) weight = parseFloat(val);
                    if ((h.includes('fat') && h.includes('%')) || h.includes('body fat')) fat = parseFloat(val);
                    if (h.includes('fat mass') && weight) fat = (parseFloat(val) / weight) * 100;
                });
                if (date && weight && fat && !logs.find(l => l.date === date)) {
                    logs.push({ date, weight, bf: parseFloat(fat.toFixed(2)) });
                    added++;
                }
            }
            if (added > 0) {
                saveData();
                updateDashboard();
                updateChart(currentFilter);
                renderHistory();
                alert(`Imported ${added} measurements!`);
            } else {
                alert('No new valid measurements found.');
            }
        }

        function showProfileModal() {
            document.getElementById('profile-height').value = profile.heightInches || 63.5;
            document.getElementById('profile-name').value = profile.name || '';
            document.getElementById('profile-gender').value = profile.gender || 'female';
            document.getElementById('goal-weight').value = goals.targetWeight || '';
            document.getElementById('goal-bf').value = goals.targetBF || '';
            document.getElementById('goal-ffmi').value = goals.targetFFMI || '';
            document.getElementById('profile-modal').classList.remove('hidden');
            document.getElementById('profile-modal').classList.add('flex');
        }

        function hideProfileModal() {
            document.getElementById('profile-modal').classList.add('hidden');
            document.getElementById('profile-modal').classList.remove('flex');
        }

        function saveProfileAndGoals() {
            profile.heightInches = parseFloat(document.getElementById('profile-height').value) || 63.5;
            profile.name = document.getElementById('profile-name').value || '';
            profile.gender = document.getElementById('profile-gender').value || 'female';
            
            goals.targetWeight = parseFloat(document.getElementById('goal-weight').value) || null;
            goals.targetBF = parseFloat(document.getElementById('goal-bf').value) || null;
            goals.targetFFMI = parseFloat(document.getElementById('goal-ffmi').value) || null;

            saveData();
            hideProfileModal();
            updateFFMITooltip();
            updateDashboard();
        }

        function updateFFMITooltip() {
            const tooltip = document.getElementById('ffmi-tooltip');
            if (!tooltip) return;

            const categories = getFFMICategories(profile.gender || 'female');
            let html = `
                <strong>FFMI Formula</strong><br>
                FFMI = Lean Mass (kg) ÷ Height² (m)<br><br>
                <strong>Lean Mass</strong> = Weight × (1 − Body Fat %)<br><br>
                <strong>FFMI Categories (${profile.gender === 'male' ? 'Men' : 'Women'})</strong><br>
            `;

            categories.forEach(cat => {
                html += `• <strong>${cat.range}</strong> → ${cat.label}<br>`;
            });

            tooltip.innerHTML = html;
        }

        function clearData() {
            if (confirm('Clear all data?')) {
                localStorage.clear();
                location.reload();
            }
        }

        function init() {
            loadData();

            if (!profile.gender) profile.gender = 'female';

            const dateInput = document.getElementById('quick-date');
            if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];

            updateDashboard();
            updateFFMITooltip();
            renderHistory();

            setTimeout(() => {
                updateChart('month');
            }, 150);
        }

        window.onload = init;
    </script>
</body>
</html>
